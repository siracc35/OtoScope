[phases.setup]
nixPkgs = ["python3", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install -r server/requirements.txt",
  "cd client && npm install",
]

[phases.build]
cmds = ["cd client && npm run build"]

[start]
cmd = "cd server && /app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
