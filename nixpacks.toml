[phases.setup]
nixPkgs = ["python3", "python3Packages.pip", "nodejs"]

[phases.install]
cmds = [
  "pip install -r server/requirements.txt",
  "cd client && npm install",
]

[phases.build]
cmds = ["cd client && npm run build"]

[start]
cmd = "cd server && uvicorn main:app --host 0.0.0.0 --port $PORT"
