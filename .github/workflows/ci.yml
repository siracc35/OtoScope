name: OtoScope CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f server/requirements.txt ]; then pip install -r server/requirements.txt; fi
        
    - name: Lint with Ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check server/ --select=E9,F63,F7,F82 --output-format=github
        
    - name: Test with pytest
      run: |
        # we will add tests in the future
        echo "No tests configured yet. Passing pipeline."
        # pytest server/
